<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Theif(Facebook)</title>
    <style>
        body{
            background-color: hotpink;
            font-family: Arial, Helvetica, sans-serif;
        }
        date{
            background-color: blue;
        }
    </style>
</head>
<body>
    <form action="#">
        <label for="nam">
            Name : <input type="text" name="name_for_PHP" id="nam">
        </label>
        <br>
        <br>
        <label for="mail">
            Email : <input type="email" name="email_for_PHP" id="mail">
        </label>
        <br>
        <br>
        <label for="pass">
            Password : <input type="password" name="password_for_PHP" id="pass">
        </label>
        <br>
        <br>
        <label for="genmale">
            Gender :<input type="radio" id = "genmale" name = "gender_for_PHP"> Male 
        </label>
        <label for="genfemale">
            <input type="radio" id = "genfemale" name = "gender_for_PHP"> Female 
        </label>
        <label>
            <input type="radio" id = "gencustoms" name = "gender_for_PHP"> Customs
        </label>
        <br>
        <br>
        <label for="date1">
            Date <input type="date" id = "date1" name = "date_for_PHP">
        </label>
        <br>
        <br>
        <label>
            <input type="submit" value="Click ME">
        </label>
        <br>
        <br>
        <label>
            <input type="reset" value="Don't Click Me">
        </label>
    </form>
</body>
</html>
